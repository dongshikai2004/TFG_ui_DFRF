<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>实时对话系统 - DATA HAMMER</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* 录音器特有样式 */
        .voice-recorder {
            width: 100%;
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            text-align: center;
        }
        .record-btn {
            background: transparent;
            color: #ff2a2a;
            border: 2px solid #ff2a2a;
            border-radius: 50px;
            padding: 10px 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 0 auto 10px;
        }
        .record-btn:hover { background: rgba(255, 42, 42, 0.1); box-shadow: 0 0 15px #ff2a2a; }
        .record-btn.recording { background: #00ff88; border-color: #00ff88; color: #000; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(0, 255, 136, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); } }
        .timer { font-family: monospace; font-size: 1.5rem; color: var(--primary-color); margin: 10px 0; }
        .recording-indicator { color: #ff2a2a; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: bold; }
        .recording-dot { width: 10px; height: 10px; background: #ff2a2a; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

        /* 设置面板样式 */
        .settings-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: background 0.3s;
        }
        .settings-toggle:hover { background: rgba(255, 255, 255, 1); }
        .settings-panel {
            position: fixed;
            top: 0;
            right: -300px;
            width: 300px;
            height: 100%;
            background: #fff;
            box-shadow: -4px 0 8px rgba(0, 0, 0, 0.2);
            padding: 40px 20px;
            border-left: 1px solid #ddd;
            transition: right 0.3s;
        }
        .settings-panel.active {
            right: 0;
        }
        .settings-panel h3 {
            margin: 0 0 20px;
            font-size: 1.5rem;
            color: var(--primary-color);
        }
        .settings-panel label {
            margin: 10px 0 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .settings-panel select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <h2>实时对话系统</h2>
    
    <div class="video-page-container">
        <div class="video-display">
            <!-- 录音区 -->
            <div class="voice-recorder">
                <button id="recordButton" class="record-btn"><span>●</span> REC / 开始录音</button>
                <div class="timer" id="timer">00:00</div>
                <div class="recording-indicator" id="recordingIndicator" style="display: none;">
                    <div class="recording-dot"></div><span>RECORDING...</span>
                </div>
                <div class="status-message" id="statusMessage" style="color:#888; font-size:0.8rem;">SYSTEM READY</div>
            </div>
            <!-- 视频区 -->
            <video id="chatVideo" controls>
                <source src="{{ url_for('static', filename='videos/video.mp4') }}" type="video/mp4">
            </video>
            <!-- 音调/速度控制条 -->
            <div style="width: 100%; max-width: 500px; margin-top: 10px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px solid var(--border-color);">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px;">
                    <label style="margin:0; font-size: 0.8rem; color: #fff; min-width: 60px;">速度/音调:</label>
                    <input type="range" id="playbackRateSlider" min="0.5" max="2.0" step="0.1" value="1.0" style="flex: 1; cursor: pointer;">
                    <span id="playbackRateValue" style="font-size: 0.8rem; color: var(--primary-color); width: 30px;">1.0x</span>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="preservePitchCheckbox" checked style="width: auto;">
                    <label for="preservePitchCheckbox" style="margin:0; font-size: 0.8rem; color: #ccc; cursor: pointer;">保持原调 (Preserve Pitch)</label>
                </div>
                <div style="font-size: 0.7rem; color: #888; margin-top: 5px;">* 关闭"保持原调"后，调节速度将改变音调</div>
            </div>
        </div>

        <div class="form-section">
            <form id="chatForm">
                <div class="form-group">
                    <label>模型名称 / MODEL</label>
                    <select name="model_name">
                        <option value="DFRF">DFRF</option>
                        <option value="VideoRetalk">VideoRetalk</option>
                    </select>
                </div>
                <div class="form-group"><label>Epoch</label><input type="number" name="iter" min="1" value="10"></div>
                <div class="form-group"><label>参考视频 / REF VIDEO</label><input type="text" name="ref_video" placeholder="Enter path..."></div>
                <div class="form-group">
                    <label>语音克隆 / VOICE CLONE</label>
                    <select name="voice_clone">
                        <option value="CosyVoice 部署">CosyVoice</option>
                        <option value="CosyVoice API">CosyVoice API</option>
                    </select>
                </div>
                <div class="form-group"><label>参考音频 / REF AUDIO</label><input type="text" name="ref_audio" placeholder="Enter path..."></div>
                <div class="form-group">
                    <label>LLM API</label>
                    <select name="api_choice">
                        <option value="qwen3-4b">qwen3-4b</option>
                        <option value="qwen3-14b">qwen3-14b</option>
                        <option value="qwen3-32b">qwen3-32b</option>
                        <option value="deepseek-v3">deepseek-v3</option>
                        <option value="glm-4.5">glm-4.5</option>
                    </select>
                </div>
                <button type="submit" class="generate-btn">启动对话 / START SESSION</button>
            </form>
        </div>
    </div>

    <!-- 外观设置组件 -->
    <div class="settings-toggle" onclick="document.getElementById('settingsPanel').classList.toggle('active')">⚙️</div>
    <div class="settings-panel" id="settingsPanel">
        <h3>外观设置 / SETTINGS</h3>
        <div style="display:flex; flex-direction:column;">
            <label>主题颜色 / THEME</label>
            <select id="themeSelect" onchange="changeTheme(this.value)">
                <option value="cyan">核心青 (Default)</option>
                <option value="purple">核心紫 (Purple)</option>
                <option value="gold">赛博金 (Gold)</option>
                <option value="green">黑客绿 (Green)</option>
                <option value="red">警示红 (Red)</option>
            </select>
        </div>
        <div style="display:flex; flex-direction:column;">
            <label>字体选择 / FONT</label>
            <select id="fontSelect" onchange="changeFont(this.value)">
                <option value='"Segoe UI", "Microsoft YaHei", sans-serif'>默认黑体</option>
                <option value='"Courier New", Courier, monospace'>代码风格 (Mono)</option>
                <option value='"Times New Roman", serif'>衬线风格 (Serif)</option>
                <option value='"Arial", sans-serif'>无衬线 (Arial)</option>
            </select>
        </div>
        <div style="display:flex; flex-direction:column;">
            <label>粒子颜色 / PARTICLE COLOR</label>
            <input type="color" id="particleColorInput" onchange="changeParticleColor(this.value)" style="width:100%; height:35px; padding:2px; background:var(--input-bg); border:1px solid var(--border-color); border-radius:4px; cursor:pointer;">
        </div>
    </div>

    <script>
        const themes = {
            cyan: { '--primary-color': '#00f3ff', '--secondary-color': '#bc13fe' },
            purple: { '--primary-color': '#bc13fe', '--secondary-color': '#00f3ff' },
            gold: { '--primary-color': '#ffd700', '--secondary-color': '#ff4500' },
            green: { '--primary-color': '#00ff00', '--secondary-color': '#003300' },
            red: { '--primary-color': '#ff2a2a', '--secondary-color': '#ff8800' }
        };
        function changeTheme(name) {
            const t = themes[name] || themes.cyan;
            for (let k in t) document.documentElement.style.setProperty(k, t[k]);
            localStorage.setItem('site_theme', name);
        }
        function changeFont(font) {
            document.documentElement.style.setProperty('--font-family-base', font);
            localStorage.setItem('site_font', font);
        }

        // 粒子颜色全局变量
        let particleColorHex = '#00f3ff';
        let particleColorRgb = '0, 243, 255';

        function hexToRgbString(hex) {
            let c;
            if(/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)){
                c= hex.substring(1).split('');
                if(c.length== 3){
                    c= [c[0], c[0], c[1], c[1], c[2], c[2]];
                }
                c= '0x'+c.join('');
                return [(c>>16)&255, (c>>8)&255, c&255].join(',');
            }
            return '0, 243, 255';
        }

        function changeParticleColor(val) {
            particleColorHex = val;
            particleColorRgb = hexToRgbString(val);
            localStorage.setItem('site_particle_color', val);
            if(typeof init === 'function') init();
        }

        // 点击外部关闭面板
        document.addEventListener('click', function(e) {
            const panel = document.getElementById('settingsPanel');
            const toggle = document.querySelector('.settings-toggle');
            if (panel.classList.contains('active') && !panel.contains(e.target) && !toggle.contains(e.target)) {
                panel.classList.remove('active');
            }
        });

        (function initSettings(){
            const savedTheme = localStorage.getItem('site_theme');
            if(savedTheme) {
                changeTheme(savedTheme);
                const tSelect = document.getElementById('themeSelect');
                if(tSelect) tSelect.value = savedTheme;
            }
            const savedFont = localStorage.getItem('site_font');
            if(savedFont) {
                changeFont(savedFont);
                const fSelect = document.getElementById('fontSelect');
                if(fSelect) fSelect.value = savedFont;
            }
            const savedPColor = localStorage.getItem('site_particle_color');
            if(savedPColor) {
                particleColorHex = savedPColor;
                particleColorRgb = hexToRgbString(savedPColor);
                const pInput = document.getElementById('particleColorInput');
                if(pInput) pInput.value = savedPColor;
            } else {
                const pInput = document.getElementById('particleColorInput');
                if(pInput) pInput.value = particleColorHex;
            }
        })();
    </script>

    <!-- 粒子脚本 -->
    <script>
        const canvas = document.getElementById('bg-canvas'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particlesArray; let mouse = { x: null, y: null, radius: 150 };
        window.addEventListener('mousemove', function(e) { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('mouseout', function(){ mouse.x = undefined; mouse.y = undefined; });
        window.addEventListener('resize', function() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; init(); });
        class Particle {
            constructor(x, y, dx, dy, size, color) { this.x=x;this.y=y;this.dx=dx;this.dy=dy;this.size=size;this.color=color; }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2, false); ctx.fillStyle=this.color; ctx.fill(); }
            update() {
                if(this.x>canvas.width||this.x<0) this.dx=-this.dx; if(this.y>canvas.height||this.y<0) this.dy=-this.dy;
                let dx=mouse.x-this.x; let dy=mouse.y-this.y; let dist=Math.sqrt(dx*dx+dy*dy);
                if(dist<mouse.radius && mouse.x!==undefined){
                    const force=(mouse.radius-dist)/mouse.radius; this.x+=(dx/dist)*force*3; this.y+=(dy/dist)*force*3;
                } else { this.x+=this.dx; this.y+=this.dy; }
                this.draw();
            }
        }
        function init(){ particlesArray=[]; for(let i=0; i<(canvas.height*canvas.width)/9000; i++){ let s=(Math.random()*2)+1; particlesArray.push(new Particle(Math.random()*canvas.width, Math.random()*canvas.height, (Math.random()-0.5), (Math.random()-0.5), s, particleColorHex)); } }
        function animate(){ requestAnimationFrame(animate); ctx.clearRect(0,0,innerWidth,innerHeight); particlesArray.forEach(p=>p.update()); connect(); }
        function connect(){
            for(let a=0;a<particlesArray.length;a++){ for(let b=a;b<particlesArray.length;b++){
                let d=((particlesArray[a].x-particlesArray[b].x)**2)+((particlesArray[a].y-particlesArray[b].y)**2);
                if(d<(canvas.width/7)*(canvas.height/7)){ ctx.strokeStyle='rgba(' + particleColorRgb + ','+(1-d/20000)+')'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(particlesArray[a].x,particlesArray[a].y); ctx.lineTo(particlesArray[b].x,particlesArray[b].y); ctx.stroke(); }
            } if(mouse.x!==undefined){ let md=((particlesArray[a].x-mouse.x)**2)+((particlesArray[a].y-mouse.y)**2); if(md<20000){ ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.moveTo(particlesArray[a].x,particlesArray[a].y); ctx.lineTo(mouse.x,mouse.y); ctx.stroke(); } } }
        }
        init(); animate();
    </script>

    <!-- 录音逻辑 -->
    <script>
        // 音调/速度控制逻辑
        const video = document.getElementById('chatVideo');
        const slider = document.getElementById('playbackRateSlider');
        const valueDisplay = document.getElementById('playbackRateValue');
        const pitchCheckbox = document.getElementById('preservePitchCheckbox');

        function updatePlayback() {
            video.playbackRate = parseFloat(slider.value);
            const preserve = pitchCheckbox.checked;
            if (video.preservesPitch !== undefined) video.preservesPitch = preserve;
            else if (video.mozPreservesPitch !== undefined) video.mozPreservesPitch = preserve;
            else if (video.webkitPreservesPitch !== undefined) video.webkitPreservesPitch = preserve;
            valueDisplay.textContent = slider.value + 'x';
        }

        slider.addEventListener('input', updatePlayback);
        pitchCheckbox.addEventListener('change', updatePlayback);

        let mediaRecorder; let audioChunks = []; let isRecording = false; let startTime; let timerInterval;
        const recordButton = document.getElementById('recordButton');
        const timerDisplay = document.getElementById('timer');
        const recordingIndicator = document.getElementById('recordingIndicator');
        const statusMessage = document.getElementById('statusMessage');

        function formatTime(sec) { return `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`; }
        function updateTimer() { timerDisplay.textContent = formatTime(Math.floor((Date.now()-startTime)/1000)); }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream); audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/wav' });
                    // 假设后端支持 wav 转换，这里直接传blob，若需webmToWav需额外库
                    const formData = new FormData(); formData.append('audio', blob, 'input.wav');
                    fetch('/save_audio', { method: 'POST', body: formData })
                    .then(r => r.json()).then(d => { statusMessage.textContent = d.status==='success'?'AUDIO SAVED':'FAILED'; })
                    .catch(e => statusMessage.textContent = 'ERROR');
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start(); isRecording = true;
                recordButton.innerHTML = '<span>■</span> STOP / 停止'; recordButton.classList.add('recording');
                recordingIndicator.style.display = 'flex'; statusMessage.textContent = 'RECORDING...';
                startTime = Date.now(); timerInterval = setInterval(updateTimer, 1000);
            } catch (e) { statusMessage.textContent = 'MIC DENIED'; }
        }
        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop(); isRecording = false;
                recordButton.innerHTML = '<span>●</span> REC / 开始录音'; recordButton.classList.remove('recording');
                recordingIndicator.style.display = 'none'; clearInterval(timerInterval);
            }
        }
        recordButton.addEventListener('click', () => isRecording ? stopRecording() : startRecording());

        document.getElementById('chatForm').addEventListener('submit', function(e){
            e.preventDefault();
            const btn = this.querySelector('.generate-btn'); btn.innerHTML = 'PROCESSING...';
            const formData = new FormData(this);
            fetch('/chat_system', { method: 'POST', body: formData }).then(r=>r.json()).then(d=>{
                if(d.status==='success') {
                    const v = document.getElementById('chatVideo'); v.src = d.video_path + '?t=' + Date.now(); v.play();
                }
                btn.innerHTML = '启动对话 / START SESSION';
            });
        });
    </script>
</body>
</html>
