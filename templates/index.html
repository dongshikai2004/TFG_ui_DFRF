<!doctype html>
<html lang="zh">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>DATA HAMMER GROUP TALKING SYSTEM</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
        <style>
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                overflow: hidden; /* 首页不滚动 */
            }
            .container {
                position: relative;
                z-index: 10;
                width: 500px;
                padding: 60px 50px;
                background: var(--glass-bg);
                border: 1px solid var(--border-color);
                border-radius: 12px;
                box-shadow:
                    0 0 60px rgba(0, 0, 0, 0.9),
                    inset 0 0 30px rgba(0, 243, 255, 0.05);
                backdrop-filter: blur(15px);
                text-align: center;
            }
            /* 首页特有的流光标题 */
            h1 {
                font-size: 2.4rem;
                font-weight: 800;
                margin-bottom: 10px;
                background: linear-gradient(120deg, #fff 0%, #00f3ff 50%, #fff 100%);
                background-size: 200% auto;
                color: transparent;
                -webkit-background-clip: text;
                background-clip: text;
                animation: shine 5s linear infinite;
            }
            .subtitle {
                font-size: 0.9rem;
                color: rgba(255, 255, 255, 0.6);
                letter-spacing: 5px;
                margin-bottom: 50px;
                display: block;
            }
            .button-container {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }
            @keyframes shine {
                to {
                    background-position: 200% center;
                }
            }

            /* 设置面板样式 */
            .settings-toggle {
                position: fixed;
                top: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
                background: rgba(255, 255, 255, 0.2);
                color: #fff;
                border: none;
                border-radius: 50%;
                cursor: pointer;
                display: flex;
                justify-content: center;
                align-items: center;
                backdrop-filter: blur(10px);
                z-index: 100;
            }
            .settings-toggle:hover {
                background: rgba(255, 255, 255, 1);
            }
            .settings-panel {
                position: fixed;
                top: 0;
                right: -300px;
                width: 300px;
                height: 100%;
                background: var(--glass-bg);
                border: none; /* 清除全局样式继承的四周边框 */
                border-left: 1px solid var(--border-color);
                border-radius: 12px 0 0 12px; /* 修正圆角方向：左上和左下圆角 */
                box-shadow: -4px 0 8px rgba(0, 0, 0, 0.2);
                padding: 40px 20px;
                box-sizing: border-box; /* 修复宽度计算问题，防止padding撑大容器导致无法完全隐藏 */
                transition: right 0.3s;
                z-index: 200;
                backdrop-filter: blur(15px); /* 补全磨砂效果 */
                display: flex;
                flex-direction: column;
                gap: 20px;
            }
            .settings-panel.active {
                right: 0;
            }
            .settings-panel h3 {
                margin: 0; /* 去掉下边距，由父容器控制布局 */
                font-size: 1.5rem;
                color: #fff;
            }
            .settings-panel label {
                font-size: 0.9rem;
                color: rgba(255, 255, 255, 0.8);
                margin-bottom: 5px;
            }
            .settings-panel select {
                padding: 10px;
                border: 1px solid var(--border-color);
                border-radius: 8px;
                background: var(--input-bg);
                color: #fff;
                font-size: 1rem;
            }
        </style>
    </head>
    <body class="main-bg">
        {% if current_user %}
        <div style="position: fixed; top: 20px; left: 20px; z-index: 120; display: flex; gap: 10px; align-items: center">
            <span style="padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 20px; background: var(--glass-bg); color: #fff; font-size: 0.85rem; backdrop-filter: blur(10px)"> 当前用户：{{ current_user['username'] }} </span>
            <a href="{{ url_for('logout') }}" style="padding: 10px 16px; border: 1px solid var(--primary-color); border-radius: 8px; background: rgba(0, 243, 255, 0.12); color: var(--primary-color); text-decoration: none; font-weight: 700; font-size: 0.85rem; letter-spacing: 1px; transition: all 0.25s"> 退出登录 / LOGOUT </a>
        </div>
        {% endif %}

        <canvas id="bg-canvas"></canvas>

        <div class="container">
            <h1>DATA HAMMER</h1>
            <span class="subtitle">GROUP TALKING SYSTEM</span>
            <div class="button-container">
                <button class="generate-btn" onclick="window.location.href = '/model_training'">训练模型</button>
                <button class="generate-btn" onclick="window.location.href = '/video_generation'">视频生成</button>
                <button class="generate-btn" onclick="window.location.href = '/chat_system'">人机对话</button>
            </div>
        </div>

        <!-- 外观设置组件 -->
        <div class="settings-toggle" onclick="document.getElementById('settingsPanel').classList.toggle('active')">⚙️</div>
        <div class="settings-panel" id="settingsPanel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px">
                <h3>外观设置 / SETTINGS</h3>
                <button onclick="document.getElementById('settingsPanel').classList.remove('active')" style="background: none; border: none; color: white; font-size: 2rem; cursor: pointer; line-height: 1">&times;</button>
            </div>
            <div style="display: flex; flex-direction: column">
                <label>主题颜色 / THEME</label>
                <select id="themeSelect" onchange="changeTheme(this.value)">
                    <option value="cyan">核心青 (Default)</option>
                    <option value="purple">核心紫 (Purple)</option>
                    <option value="gold">赛博金 (Gold)</option>
                    <option value="green">黑客绿 (Green)</option>
                    <option value="red">警示红 (Red)</option>
                </select>
            </div>
            <div style="display: flex; flex-direction: column">
                <label>字体选择 / FONT</label>
                <select id="fontSelect" onchange="changeFont(this.value)">
                    <option value='"Segoe UI", "Microsoft YaHei", sans-serif'>默认黑体</option>
                    <option value='"Courier New", Courier, monospace'>代码风格 (Mono)</option>
                    <option value='"Times New Roman", serif'>衬线风格 (Serif)</option>
                    <option value='"Arial", sans-serif'>无衬线 (Arial)</option>
                </select>
            </div>
            <div style="display: flex; flex-direction: column">
                <label>粒子颜色 / PARTICLE COLOR</label>
                <input type="color" id="particleColorInput" onchange="changeParticleColor(this.value)" style="width: 100%; height: 35px; padding: 2px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer" />
            </div>
        </div>

        <script>
            const themes = {
                cyan: { "--primary-color": "#00f3ff", "--secondary-color": "#bc13fe" },
                purple: { "--primary-color": "#bc13fe", "--secondary-color": "#00f3ff" },
                gold: { "--primary-color": "#ffd700", "--secondary-color": "#ff4500" },
                green: { "--primary-color": "#00ff00", "--secondary-color": "#003300" },
                red: { "--primary-color": "#ff2a2a", "--secondary-color": "#ff8800" },
            };
            function changeTheme(name) {
                const t = themes[name] || themes.cyan;
                for (let k in t) document.documentElement.style.setProperty(k, t[k]);
                localStorage.setItem("site_theme", name);
            }
            function changeFont(font) {
                document.documentElement.style.setProperty("--font-family-base", font);
                localStorage.setItem("site_font", font);
            }

            // 粒子颜色全局变量
            let particleColorHex = "#00f3ff";
            let particleColorRgb = "0, 243, 255";

            function hexToRgbString(hex) {
                let c;
                if (/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)) {
                    c = hex.substring(1).split("");
                    if (c.length == 3) {
                        c = [c[0], c[0], c[1], c[1], c[2], c[2]];
                    }
                    c = "0x" + c.join("");
                    return [(c >> 16) & 255, (c >> 8) & 255, c & 255].join(",");
                }
                return "0, 243, 255";
            }

            function changeParticleColor(val) {
                particleColorHex = val;
                particleColorRgb = hexToRgbString(val);
                localStorage.setItem("site_particle_color", val);
                if (typeof init === "function") init(); // 重新初始化粒子
            }

            // 点击外部关闭面板
            document.addEventListener("click", function (e) {
                const panel = document.getElementById("settingsPanel");
                const toggle = document.querySelector(".settings-toggle");
                if (panel.classList.contains("active") && !panel.contains(e.target) && !toggle.contains(e.target)) {
                    panel.classList.remove("active");
                }
            });

            // 初始化设置
            (function initSettings() {
                const savedTheme = localStorage.getItem("site_theme");
                if (savedTheme) {
                    changeTheme(savedTheme);
                    const tSelect = document.getElementById("themeSelect");
                    if (tSelect) tSelect.value = savedTheme;
                }
                const savedFont = localStorage.getItem("site_font");
                if (savedFont) {
                    changeFont(savedFont);
                    const fSelect = document.getElementById("fontSelect");
                    if (fSelect) fSelect.value = savedFont;
                }
                const savedPColor = localStorage.getItem("site_particle_color");
                if (savedPColor) {
                    particleColorHex = savedPColor;
                    particleColorRgb = hexToRgbString(savedPColor);
                    const pInput = document.getElementById("particleColorInput");
                    if (pInput) pInput.value = savedPColor;
                } else {
                    const pInput = document.getElementById("particleColorInput");
                    if (pInput) pInput.value = particleColorHex;
                }
            })();
        </script>

        <!-- 粒子特效脚本 (所有页面通用逻辑) -->
        <script>
            const canvas = document.getElementById("bg-canvas");
            const ctx = canvas.getContext("2d");
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let particlesArray;
            let mouse = { x: null, y: null, radius: 150 };

            window.addEventListener("mousemove", function (event) {
                mouse.x = event.x;
                mouse.y = event.y;
            });
            window.addEventListener("mouseout", function () {
                mouse.x = undefined;
                mouse.y = undefined;
            });
            window.addEventListener("resize", function () {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                init();
            });

            class Particle {
                constructor(x, y, dx, dy, size, color) {
                    this.x = x;
                    this.y = y;
                    this.dx = dx;
                    this.dy = dy;
                    this.size = size;
                    this.color = color;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
                update() {
                    if (this.x > canvas.width || this.x < 0) this.dx = -this.dx;
                    if (this.y > canvas.height || this.y < 0) this.dy = -this.dy;
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < mouse.radius && mouse.x !== undefined) {
                        const force = (mouse.radius - distance) / mouse.radius;
                        this.x += (dx / distance) * force * 3;
                        this.y += (dy / distance) * force * 3;
                    } else {
                        this.x += this.dx;
                        this.y += this.dy;
                    }
                    this.draw();
                }
            }

            function init() {
                particlesArray = [];
                let numberOfParticles = (canvas.height * canvas.width) / 9000;
                for (let i = 0; i < numberOfParticles; i++) {
                    let size = Math.random() * 2 + 1;
                    let x = Math.random() * canvas.width;
                    let y = Math.random() * canvas.height;
                    let dx = Math.random() - 0.5;
                    let dy = Math.random() - 0.5;
                    particlesArray.push(new Particle(x, y, dx, dy, size, particleColorHex));
                }
            }

            function animate() {
                requestAnimationFrame(animate);
                ctx.clearRect(0, 0, innerWidth, innerHeight);
                for (let i = 0; i < particlesArray.length; i++) {
                    particlesArray[i].update();
                }
                connect();
            }

            function connect() {
                for (let a = 0; a < particlesArray.length; a++) {
                    for (let b = a; b < particlesArray.length; b++) {
                        let d = (particlesArray[a].x - particlesArray[b].x) ** 2 + (particlesArray[a].y - particlesArray[b].y) ** 2;
                        if (d < (canvas.width / 7) * (canvas.height / 7)) {
                            ctx.strokeStyle = "rgba(" + particleColorRgb + "," + (1 - d / 20000) + ")";
                            ctx.lineWidth = 1;
                            ctx.beginPath();
                            ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                            ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                            ctx.stroke();
                        }
                    }
                    if (mouse.x !== undefined) {
                        let md = (particlesArray[a].x - mouse.x) ** 2 + (particlesArray[a].y - mouse.y) ** 2;
                        if (md < 20000) {
                            ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
                            ctx.lineWidth = 1;
                            ctx.beginPath();
                            ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                            ctx.lineTo(mouse.x, mouse.y);
                            ctx.stroke();
                        }
                    }
                }
            }
            init();
            animate();
        </script>
    </body>
</html>
